<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Payment - Online Auction</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://js.stripe.com/v3/"></script>
</head>
<body>
    <div th:replace="fragments/navbar :: navbar"></div>

    <div class="container mt-5">
        <h2>Complete Payment</h2>
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <div class="card">
            <div class="card-body">
                <h5 class="card-title" th:text="'Pay for: ' + ${item.title}"></h5>
                <p class="card-text" th:text="'Winning Bid: $' + ${item.bids[0].amount}"></p>

                <form id="payment-form">
                    <div id="card-element">
                        <!-- A Stripe Element will be inserted here. -->
                    </div>

                    <!-- Used to display form errors. -->
                    <div id="card-errors" role="alert"></div>

                    <button id="submit" class="btn btn-primary mt-3">Pay Now</button>
                </form>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        const stripe = Stripe("[[${stripePublishableKey}]]");
        const elements = stripe.elements();
        const cardElement = elements.create('card');
        cardElement.mount('#card-element');

        const form = document.getElementById('payment-form');
        const submitButton = document.getElementById('submit');

        form.addEventListener('submit', async (event) => {
            event.preventDefault();

            submitButton.disabled = true;

            const {error, paymentMethod} = await stripe.createPaymentMethod({
                type: 'card',
                card: cardElement,
            });

            if (error) {
                const errorElement = document.getElementById('card-errors');
                errorElement.textContent = error.message;
                submitButton.disabled = false;
            } else {
                // Submit the form with the payment method ID
                const formData = new FormData();
                formData.append('paymentMethodId', paymentMethod.id);
                formData.append('itemId', [[${item.id}]]);

                fetch('/confirm-payment', {
                    method: 'POST',
                    body: formData
                }).then(response => {
                    if (response.ok) {
                        window.location.href = '/payment/success';
                    } else {
                        window.location.href = '/payment/failure';
                    }
                });
            }
        });
    </script>
</body>
</html>
