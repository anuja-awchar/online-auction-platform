<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Register - Online Auction Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    animation: {
                        'slide-in': 'slideIn 0.5s ease-out',
                        'fade-in': 'fadeIn 1s ease-out'
                    },
                    keyframes: {
                        slideIn: {
                            '0%': { transform: 'translateY(-100%)', opacity: '0' },
                            '100%': { transform: 'translateY(0)', opacity: '1' }
                        },
                        fadeIn: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' }
                        }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body class="bg-gradient-to-br from-purple-50 to-pink-50 min-h-screen">
    <header class="bg-gradient-to-r from-purple-500 to-pink-600 text-white py-4 shadow-lg animate-slide-in">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold hover:scale-105 transition-transform duration-300"><i class="fas fa-gavel animate-bounce"></i> Online Auction Platform</h1>
            <nav class="flex space-x-4">
                <a href="/" class="text-white hover:text-yellow-300 hover:bg-white hover:bg-opacity-20 px-3 py-2 rounded-lg transition-all duration-300 transform hover:scale-110"><i class="fas fa-home"></i> Home</a>
                <a href="/login" class="bg-blue-500 hover:bg-blue-600 px-3 py-2 rounded-lg transition-all duration-300 transform hover:scale-110"><i class="fas fa-sign-in-alt"></i> Login</a>
            </nav>
        </div>
    </header>

    <main class="container mx-auto py-16">
        <div class="max-w-md mx-auto bg-white rounded-xl shadow-2xl overflow-hidden animate-fade-in">
            <div class="bg-gradient-to-r from-purple-500 to-pink-600 p-6">
                <h2 class="text-2xl font-bold text-white text-center"><i class="fas fa-user-plus mr-2"></i> Join Our Community</h2>
                <p class="text-purple-100 text-center mt-2">Create your account to start bidding</p>
            </div>

            <form th:action="@{/register}" method="post" class="p-8 space-y-6">
                <div class="animate-fade-in" style="animation-delay: 0.1s">
                    <label for="username" class="block text-sm font-medium text-gray-700 mb-2">
                        <i class="fas fa-user text-purple-500 mr-2"></i>Username
                    </label>
                    <input type="text" id="username" name="username" required
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent transition-all duration-300 hover:border-purple-400"
                           placeholder="Choose a username">
                </div>

                <div class="animate-fade-in" style="animation-delay: 0.2s">
                    <label for="email" class="block text-sm font-medium text-gray-700 mb-2">
                        <i class="fas fa-envelope text-purple-500 mr-2"></i>Email Address
                    </label>
                    <input type="email" id="email" name="email" required
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent transition-all duration-300 hover:border-purple-400"
                           placeholder="Enter your email">
                </div>

                <div class="animate-fade-in" style="animation-delay: 0.3s">
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-2">
                        <i class="fas fa-lock text-purple-500 mr-2"></i>Password
                    </label>
                    <input type="password" id="password" name="password" required
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent transition-all duration-300 hover:border-purple-400"
                           placeholder="Create a password">
                </div>

                <button type="submit"
                        class="w-full bg-gradient-to-r from-purple-500 to-pink-600 text-white py-3 px-4 rounded-lg font-semibold hover:from-purple-600 hover:to-pink-700 transform hover:scale-105 transition-all duration-300 shadow-lg hover:shadow-xl animate-fade-in"
                        style="animation-delay: 0.4s">
                    <i class="fas fa-user-plus mr-2"></i>Create Account
                </button>
            </form>

            <div class="px-8 pb-8">
                <div th:if="${error}" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded-lg mb-4 animate-fade-in">
                    <i class="fas fa-exclamation-triangle mr-2"></i> <span th:text="${error}">Error message</span>
                </div>

                <div class="text-center animate-fade-in" style="animation-delay: 0.5s">
                    <p class="text-gray-600">Already have an account?
                        <a href="/login" class="text-purple-600 hover:text-purple-800 font-semibold hover:underline transition-colors duration-300">
                            Sign in here <i class="fas fa-arrow-right ml-1"></i>
                        </a>
                    </p>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-gray-800 text-gray-300 text-center py-4 mt-auto">
        <div class="container mx-auto">
            <p>&copy; 2025 Online Auction Platform. All rights reserved.</p>
        </div>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Add focus animations to form inputs
            const inputs = document.querySelectorAll('input[type="text"], input[type="email"], input[type="password"]');
            inputs.forEach(input => {
                input.addEventListener('focus', function() {
                    this.parentElement.classList.add('transform', 'scale-105');
                });
                input.addEventListener('blur', function() {
                    this.parentElement.classList.remove('transform', 'scale-105');
                });
            });
        });
    </script>
</body>
</html>
